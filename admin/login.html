<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nebula AI — Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Syne:wght@400;600;800&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 30% 20%, #0a1628, #03050b);
      font-family: 'Syne', sans-serif;
      color: #fff;
      overflow: hidden;
      position: relative;
    }

    /* Canvas background */
    #login-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* Glass card */
    .login-card {
      position: relative;
      z-index: 10;
      background: rgba(10, 20, 40, 0.75);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(218, 165, 32, 0.35);
      border-radius: 24px;
      padding: 2.8rem 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(218, 165, 32, 0.1) inset;
      transition: transform 0.3s ease, border-color 0.3s;
    }

    .login-card:hover {
      border-color: rgba(218, 165, 32, 0.6);
      transform: translateY(-3px);
    }

    .logo {
      font-family: 'Orbitron', monospace;
      font-size: 1.4rem;
      font-weight: 900;
      background: linear-gradient(90deg, #FFD700, #00f5ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-align: center;
      margin-bottom: 0.5rem;
      letter-spacing: 0.18em;
    }

    .subtitle {
      text-align: center;
      color: rgba(255, 255, 255, 0.4);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 2rem;
    }

    label {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #DAA520;
      margin-bottom: 0.5rem;
    }

    input {
      width: 100%;
      padding: 0.85rem 1rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(218, 165, 32, 0.3);
      border-radius: 10px;
      color: #fff;
      font-size: 0.95rem;
      font-family: 'Syne', sans-serif;
      outline: none;
      transition: all 0.25s;
      margin-bottom: 1.5rem;
    }

    input:focus {
      border-color: #DAA520;
      background: rgba(218, 165, 32, 0.05);
      box-shadow: 0 0 12px rgba(218, 165, 32, 0.2);
    }

    button {
      width: 100%;
      padding: 0.9rem;
      background: linear-gradient(135deg, #DAA520, #b8860b);
      border: none;
      border-radius: 10px;
      color: #000;
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.25s;
      margin-top: 0.5rem;
    }

    button:hover {
      opacity: 0.85;
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(218, 165, 32, 0.3);
    }

    .error {
      background: rgba(244, 63, 94, 0.15);
      border: 1px solid rgba(244, 63, 94, 0.4);
      color: #f87171;
      padding: 0.7rem 1rem;
      border-radius: 10px;
      font-size: 0.8rem;
      margin-bottom: 1.5rem;
      display: none;
      font-family: 'JetBrains Mono', monospace;
      text-align: center;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .login-card {
        margin: 1rem;
        padding: 2rem 1.5rem;
        max-width: 90%;
      }
      .logo {
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>

<canvas id="login-canvas"></canvas>

<div class="login-card">
  <div class="logo">NEBULA AI</div>
  <div class="subtitle">ADMIN ACCESS</div>
  <div class="error" id="error"></div>
  <label>USERNAME</label>
  <input type="text" id="username" placeholder="Enter username" autocomplete="off" />
  <label>PASSWORD</label>
  <input type="password" id="password" placeholder="Enter password" />
  <button onclick="login()">⟡ AUTHENTICATE ⟡</button>
</div>

<!-- Three.js animated background (same style as main index) -->
<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
    }
  }
</script>

<script type="module">
  import * as THREE from 'three';

  const canvas = document.getElementById('login-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x020812, 0.0015);
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 1, 12);
  camera.lookAt(0, 0, 0);

  // Lights
  const ambient = new THREE.AmbientLight(0x111122);
  scene.add(ambient);
  const dirLight = new THREE.DirectionalLight(0xffdd99, 1.0);
  dirLight.position.set(5, 8, 3);
  scene.add(dirLight);
  const pointLight = new THREE.PointLight(0xffaa33, 0.6);
  pointLight.position.set(2, 3, 4);
  scene.add(pointLight);

  // Central sphere (nebula core)
  const geometry = new THREE.SphereGeometry(1.1, 64, 64);
  const material = new THREE.MeshStandardMaterial({
    color: 0x2a5f8f,
    emissive: 0x113355,
    emissiveIntensity: 0.5,
    metalness: 0.7,
    roughness: 0.3
  });
  const core = new THREE.Mesh(geometry, material);
  scene.add(core);

  // Rings
  const ringGeo = new THREE.TorusGeometry(1.6, 0.06, 32, 200);
  const ringMat = new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0xff4400, emissiveIntensity: 0.4 });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = Math.PI / 2.2;
  ring.rotation.z = 0.3;
  scene.add(ring);

  const outerRingGeo = new THREE.TorusGeometry(2.0, 0.03, 32, 300);
  const outerRingMat = new THREE.MeshStandardMaterial({ color: 0x88ccff, emissive: 0x2266aa, emissiveIntensity: 0.3 });
  const outerRing = new THREE.Mesh(outerRingGeo, outerRingMat);
  outerRing.rotation.x = Math.PI / 1.8;
  scene.add(outerRing);

  // Starfield particles
  const starCount = 1800;
  const starGeo = new THREE.BufferGeometry();
  const starPositions = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount; i++) {
    starPositions[i*3] = (Math.random() - 0.5) * 200;
    starPositions[i*3+1] = (Math.random() - 0.5) * 100;
    starPositions[i*3+2] = (Math.random() - 0.5) * 80 - 30;
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
  const starMat = new THREE.PointsMaterial({ color: 0xffdd88, size: 0.08, transparent: true, blending: THREE.AdditiveBlending });
  const stars = new THREE.Points(starGeo, starMat);
  scene.add(stars);

  // Floating dust particles
  const dustCount = 800;
  const dustGeo = new THREE.BufferGeometry();
  const dustPositions = new Float32Array(dustCount * 3);
  for (let i = 0; i < dustCount; i++) {
    dustPositions[i*3] = (Math.random() - 0.5) * 25;
    dustPositions[i*3+1] = (Math.random() - 0.5) * 15;
    dustPositions[i*3+2] = (Math.random() - 0.5) * 12 - 5;
  }
  dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
  const dustMat = new THREE.PointsMaterial({ color: 0xcceeff, size: 0.04, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending });
  const dust = new THREE.Points(dustGeo, dustMat);
  scene.add(dust);

  // Small orbiting satellites
  const sats = [];
  for (let i = 0; i < 16; i++) {
    const sat = new THREE.Mesh(
      new THREE.BoxGeometry(0.08, 0.08, 0.08),
      new THREE.MeshStandardMaterial({ color: 0xffbb55, emissive: 0x442200, metalness: 0.8 })
    );
    sat.userData = {
      radius: 2.2 + Math.random() * 0.6,
      speed: 0.005 + Math.random() * 0.003,
      angle: (i / 16) * Math.PI * 2,
      yOffset: (Math.random() - 0.5) * 1.2
    };
    scene.add(sat);
    sats.push(sat);
  }

  let mouseX = 0, mouseY = 0;
  document.addEventListener('mousemove', (e) => {
    mouseX = (e.clientX / window.innerWidth) * 2 - 1;
    mouseY = (e.clientY / window.innerHeight) * 2 - 1;
  });

  let time = 0;
  function animate() {
    requestAnimationFrame(animate);
    time += 0.012;

    core.rotation.y += 0.003;
    core.rotation.x = Math.sin(time * 0.2) * 0.08;
    ring.rotation.z += 0.007;
    outerRing.rotation.x += 0.003;
    outerRing.rotation.z += 0.002;
    stars.rotation.y += 0.0005;
    dust.rotation.x += 0.0003;
    dust.rotation.y += 0.0002;

    sats.forEach(sat => {
      sat.userData.angle += sat.userData.speed;
      sat.position.x = Math.cos(sat.userData.angle) * sat.userData.radius;
      sat.position.z = Math.sin(sat.userData.angle) * sat.userData.radius;
      sat.position.y = Math.sin(sat.userData.angle * 1.5) * 0.3 + sat.userData.yOffset;
      sat.rotation.x += 0.05;
      sat.rotation.y += 0.04;
    });

    // Smooth camera follow
    camera.position.x += (mouseX * 0.4 - camera.position.x) * 0.05;
    camera.position.y += (-mouseY * 0.3 - camera.position.y) * 0.05;
    camera.lookAt(0, 0.2, 0);

    pointLight.intensity = 0.5 + Math.sin(time * 2) * 0.15;

    renderer.render(scene, camera);
  }

  animate();

  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
  });

  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setClearColor(0x000000, 0);
</script>

<script>
  async function login() {
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const errorEl = document.getElementById('error');
    errorEl.style.display = 'none';

    try {
      const res = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (data.token) {
        localStorage.setItem('adminToken', data.token);
        window.location.href = '/admin/index.html';
      } else {
        errorEl.textContent = data.error || 'Authentication failed';
        errorEl.style.display = 'block';
      }
    } catch (err) {
      errorEl.textContent = 'Server error. Please try again.';
      errorEl.style.display = 'block';
    }
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') login();
  });
</script>
</body>
</html>
