<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nebula AI — Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Syne:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at 30% 20%, #0a1628, #03050b);
      font-family: 'Syne', sans-serif; color: #fff;
    }
    .box {
      background: rgba(10,20,40,0.85); backdrop-filter: blur(20px);
      border: 1px solid rgba(218,165,32,0.3); border-radius: 20px;
      padding: 3rem 2.5rem; width: 100%; max-width: 400px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }
    .logo {
      font-family: 'Orbitron', monospace; font-size: 1.3rem; font-weight: 900;
      background: linear-gradient(90deg, #FFD700, #00f5ff);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      text-align: center; margin-bottom: 0.5rem; letter-spacing: 0.15em;
    }
    .subtitle {
      text-align: center; color: rgba(255,255,255,0.4);
      font-size: 0.78rem; letter-spacing: 0.15em; text-transform: uppercase;
      margin-bottom: 2.5rem;
    }
    label {
      display: block; font-size: 0.72rem; letter-spacing: 0.15em;
      text-transform: uppercase; color: #DAA520; margin-bottom: 0.5rem;
    }
    input {
      width: 100%; padding: 0.85rem 1rem;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(218,165,32,0.3);
      border-radius: 8px; color: #fff; font-size: 0.95rem;
      outline: none; transition: border-color 0.2s; margin-bottom: 1.2rem;
    }
    input:focus { border-color: #DAA520; }
    button {
      width: 100%; padding: 0.9rem;
      background: linear-gradient(135deg, #DAA520, #b8860b);
      border: none; border-radius: 8px; color: #000;
      font-family: 'Orbitron', monospace; font-weight: 700;
      font-size: 0.85rem; letter-spacing: 0.15em; cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    .error {
      background: rgba(244,63,94,0.15); border: 1px solid rgba(244,63,94,0.4);
      color: #f87171; padding: 0.75rem 1rem; border-radius: 8px;
      font-size: 0.85rem; margin-bottom: 1rem; display: none;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">NEBULA AI</div>
    <div class="subtitle">Admin Control Panel</div>
    <div class="error" id="error"></div>
    <label>Username</label>
    <input type="text" id="username" placeholder="Enter username" />
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password" />
    <button onclick="login()">ACCESS SYSTEM</button>
  </div>
  <script>
    async function login() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('error');
      errorEl.style.display = 'none';
      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.token) {
          localStorage.setItem('adminToken', data.token);
          window.location.href = '/admin/index.html';
        } else {
          errorEl.textContent = data.error || 'Login failed';
          errorEl.style.display = 'block';
        }
      } catch {
        errorEl.textContent = 'Server error. Try again.';
        errorEl.style.display = 'block';
      }
    }
    document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>
